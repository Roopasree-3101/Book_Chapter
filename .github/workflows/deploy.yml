name: Deploy VoiceScheme

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Deploy frontend to GitHub Pages ──────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voicescheme/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: voicescheme/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: voicescheme/frontend/build
          publish_branch: gh-pages
          force_orphan: true

  # ── Test backend ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voicescheme/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend smoke test
        run: |
          python init_db.py
          python -c "
          from eligibility import filter_schemes
          r = filter_schemes({'is_bpl': True})
          assert len(r) > 0, 'No schemes returned for BPL profile'
          print('Backend OK -', len(r), 'schemes for BPL profile')
          "
